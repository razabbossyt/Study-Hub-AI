<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Points Converter | Study Hub AI</title>
    
    <!-- SEO Optimization -->
    <meta name="description" content="Convert long paragraphs into quick revision bullet points instantly with our AI Bullet Points Converter.">
    <meta name="keywords" content="bullet points converter, summarize text, student AI tools, quick revision, Study Hub AI">
    <meta name="author" content="Study Hub AI">
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Color Palette */
            --primary: #10b981; /* Emerald Green */
            --primary-hover: #059669;
            --primary-light: #d1fae5;
            --secondary: #0ea5e9; /* Light Blue accent */
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            
            /* Text Colors */
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            
            /* Borders and Shadows */
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-glow: 0 0 15px rgba(16, 185, 129, 0.3);
            
            /* Sizing */
            --radius-md: 0.5rem;
            --radius-lg: 1rem;
            --radius-full: 9999px;
            --transition: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.25rem;
        }

        .nav-brand .icon-box {
            background: var(--primary);
            color: white;
            padding: 0.25rem 0.35rem;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Main Layout */
        main {
            flex-grow: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            width: 100%;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }
        
        .page-title span {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, var(--primary), var(--secondary));
        }

        .tool-tip {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        
        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        /* Input Section */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .input-label {
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .word-counter {
            font-size: 0.875rem;
            color: var(--text-muted);
            background: var(--bg-color);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            transition: var(--transition);
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--surface-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        /* Error Message */
        .error-msg {
            color: #ef4444; /* Red */
            background: #fef2f2;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #fecaca;
        }

        /* Action Buttons */
        .action-container {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* Output Section */
        #output-section {
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .output-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .output-title .material-symbols-outlined {
            color: var(--primary);
        }

        .bullet-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .bullet-list li {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 1rem;
            font-size: 1.05rem;
            color: var(--text-main);
            line-height: 1.7;
        }

        .bullet-list li::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0.6rem;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: auto;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .nav-links {
                display: none; /* Hide standard links on mobile */
            }
            .action-container {
                flex-direction: column-reverse;
                width: 100%;
            }
            .btn {
                width: 100%;
            }
            .output-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="nav-container">
            <a href="../index.html" class="nav-brand">
                <div class="icon-box">
                    <span class="material-symbols-outlined" style="font-size: 1.25rem;">auto_awesome</span>
                </div>
                Study Hub AI
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../tools.html">Tools</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Header Section -->
        <div class="page-header">
            <h1 class="page-title">Bullet Points <span>Converter</span></h1>
            <p class="tool-tip">Convert long paragraphs into quick, easy-to-read revision bullet points instantly.</p>
        </div>

        <!-- Input Section -->
        <div class="card">
            <div class="input-group">
                <div class="input-header">
                    <label for="text-input" class="input-label">
                        <span class="material-symbols-outlined">text_format</span>
                        Your Paragraph
                    </label>
                    <div class="word-counter">
                        <span id="word-count">0</span> words
                    </div>
                </div>
                <textarea 
                    id="text-input" 
                    placeholder="Paste your paragraph here..."
                ></textarea>
            </div>

            <!-- Error Message -->
            <div id="error-msg" class="error-msg">
                <span class="material-symbols-outlined">error</span>
                Please enter some text to convert.
            </div>

            <div class="action-container">
                <button id="clear-btn" class="btn btn-outline">
                    <span class="material-symbols-outlined">delete</span>
                    Clear
                </button>
                <button id="convert-btn" class="btn btn-primary">
                    <span class="material-symbols-outlined">format_list_bulleted</span>
                    Convert to Bullet Points
                </button>
            </div>
        </div>

        <!-- Output Section -->
        <div id="output-section" class="card">
            <div class="output-header">
                <div class="output-title">
                    <span class="material-symbols-outlined">checklist</span>
                    Generated Bullet Points
                </div>
                <button id="copy-btn" class="btn btn-outline btn-sm">
                    <span class="material-symbols-outlined" style="font-size: 1.1em;">content_copy</span>
                    Copy Points
                </button>
            </div>
            
            <ul id="bullet-result" class="bullet-list">
                <!-- Bullet points will be inserted here -->
            </ul>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Study Hub AI. Empowering students globally.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const textInput = document.getElementById('text-input');
            const wordCountDisplay = document.getElementById('word-count');
            const convertBtn = document.getElementById('convert-btn');
            const clearBtn = document.getElementById('clear-btn');
            const errorMsg = document.getElementById('error-msg');
            const outputSection = document.getElementById('output-section');
            const bulletResult = document.getElementById('bullet-result');
            const copyBtn = document.getElementById('copy-btn');

            // --- Word Counter Feature ---
            textInput.addEventListener('input', () => {
                const text = textInput.value.trim();
                const words = text.length > 0 ? text.split(/\s+/).filter(word => word.length > 0).length : 0;
                wordCountDisplay.textContent = words;
                
                if (text.length > 0) {
                    errorMsg.style.display = 'none';
                }
            });

            // --- Convert Logic Feature ---
            convertBtn.addEventListener('click', () => {
                const text = textInput.value.trim();
                
                if (text === '') {
                    errorMsg.style.display = 'flex';
                    outputSection.style.display = 'none';
                    return;
                }
                
                // Hide errors
                errorMsg.style.display = 'none';
                
                // Process text: Split by sentence boundaries (.!?)
                // Positive lookbehind for punctuation followed by space or end of string
                // More complex regex ensures we don't accidentally split on things like "Mr.", "U.S.A.", etc. completely blindly, though simple regex acts as a good starting point.
                const rawSentences = text.match(/[^.!?]+[.!?]+(?:\s|$)/g) || [text];
                
                // If the regex fallback catches the whole text as one array item (no punctuation), process it:
                let sentences = rawSentences.map(s => s.trim()).filter(s => s.length > 3);
                
                // If standard splitting failed to get more than 1 sentence, forcefully slice it by commas or newlines if it's super long.
                if (sentences.length <= 1 && text.includes('\n')) {
                    sentences = text.split('\n').map(s => s.trim()).filter(s => s.length > 3);
                }

                // If nothing was caught, just list the text itself.
                if (sentences.length === 0) {
                    sentences = [text];
                }

                // Clear previous output
                bulletResult.innerHTML = '';
                
                // Dom generation
                sentences.forEach(sentence => {
                    const li = document.createElement('li');
                    li.textContent = sentence;
                    bulletResult.appendChild(li);
                });
                
                // Show output
                outputSection.style.display = 'block';
                outputSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });

            // --- Clear Feature ---
            clearBtn.addEventListener('click', () => {
                textInput.value = '';
                wordCountDisplay.textContent = '0';
                errorMsg.style.display = 'none';
                outputSection.style.display = 'none';
                textInput.focus();
            });

            // --- Copy Feature ---
            copyBtn.addEventListener('click', () => {
                // Formatting text to copy cleanly with real bullet points
                const listItems = bulletResult.querySelectorAll('li');
                let textToCopy = '';
                
                listItems.forEach(item => {
                    textToCopy += `• ${item.textContent}\n`;
                });
                
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 1.1em;">check</span> Copied!';
                    copyBtn.style.color = 'var(--primary)';
                    copyBtn.style.borderColor = 'var(--primary)';
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHTML;
                        copyBtn.style.color = '';
                        copyBtn.style.borderColor = '';
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                });
            });
        });
    </script>
</body>
</html>
