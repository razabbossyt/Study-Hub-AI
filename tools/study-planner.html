<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner Generator | Study Hub AI</title>
    
    <!-- SEO Optimization -->
    <meta name="description" content="Create a daily study schedule for better productivity with our AI Study Planner Generator.">
    <meta name="keywords" content="study planner, study schedule, timetable generator, student productivity, Study Hub AI">
    <meta name="author" content="Study Hub AI">
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Color Palette */
            --primary: #f59e0b; /* Amber/Orange */
            --primary-hover: #d97706;
            --primary-light: #fef3c7;
            --secondary: #ef4444; /* Red accent */
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            
            /* Text Colors */
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            
            /* Borders and Shadows */
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-glow: 0 0 15px rgba(245, 158, 11, 0.3);
            
            /* Sizing */
            --radius-md: 0.5rem;
            --radius-lg: 1rem;
            --radius-full: 9999px;
            --transition: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.25rem;
        }

        .nav-brand .icon-box {
            background: var(--primary);
            color: white;
            padding: 0.25rem 0.35rem;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Main Layout */
        main {
            flex-grow: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            width: 100%;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }
        
        .page-title span {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, var(--primary), var(--secondary));
        }

        .tool-tip {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        
        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        /* Input Forms */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        @media (min-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: 1 / -1;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-label {
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: var(--transition);
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--surface-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        /* Error Message */
        .error-msg {
            color: #ef4444; /* Red */
            background: #fef2f2;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #fecaca;
        }

        /* Action Buttons */
        .action-container {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Output Section */
        #output-section {
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .output-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .output-title .material-symbols-outlined {
            color: var(--primary);
        }

        .output-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* Timetable Plan */
        .plan-header {
            background: var(--primary-light);
            color: var(--primary-hover);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-weight: 600;
            text-align: center;
            border: 1px dashed var(--primary);
        }
        
        .timetable {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .time-block {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem 1.5rem;
            transition: var(--transition);
        }

        .time-block:hover {
            border-color: var(--primary);
            background: var(--surface-color);
            box-shadow: var(--shadow-sm);
            transform: scale(1.01);
        }

        .block-time {
            font-weight: 700;
            color: var(--text-muted);
            width: 160px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .block-subject {
            font-weight: 600;
            color: var(--text-main);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .block-subject::before {
            content: '';
            display: block;
            width: 4px;
            height: 1.5rem;
            background: var(--primary);
            border-radius: 2px;
            margin-right: 0.5rem;
        }
        
        .block-break {
            background: transparent;
            border: 1px dashed var(--border-color);
        }
        
        .block-break .block-subject {
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .block-break .block-subject::before {
            background: var(--text-light);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: auto;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .nav-links {
                display: none;
            }
            .action-container {
                flex-direction: column-reverse;
                width: 100%;
            }
            .btn {
                width: 100%;
            }
            .output-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .output-actions {
                width: 100%;
            }
            .output-actions .btn {
                flex: 1;
            }
            .time-block {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .block-time {
                width: 100%;
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="nav-container">
            <a href="../index.html" class="nav-brand">
                <div class="icon-box">
                    <span class="material-symbols-outlined" style="font-size: 1.25rem;">auto_awesome</span>
                </div>
                Study Hub AI
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../tools.html">Tools</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Header Section -->
        <div class="page-header">
            <h1 class="page-title">Study Planner <span>Generator</span></h1>
            <p class="tool-tip">Create a daily study schedule for better productivity.</p>
        </div>

        <!-- Input Section -->
        <div class="card">
            <div class="form-grid">
                <!-- Subjects Input -->
                <div class="input-group full-width">
                    <label for="subjects-input" class="input-label">
                        <span class="material-symbols-outlined">menu_book</span>
                        Subjects (comma separated)
                    </label>
                    <input type="text" id="subjects-input" placeholder="Example: Math, Science, English, History">
                </div>

                <!-- Study Hours Input -->
                <div class="input-group">
                    <label for="hours-input" class="input-label">
                        <span class="material-symbols-outlined">schedule</span>
                        Study Hours Per Day
                    </label>
                    <input type="number" id="hours-input" placeholder="e.g. 4" min="1" max="14" step="1">
                </div>

                <!-- Exam Date Input -->
                <div class="input-group">
                    <label for="date-input" class="input-label">
                        <span class="material-symbols-outlined">event</span>
                        Exam Date
                    </label>
                    <input type="date" id="date-input">
                </div>
            </div>

            <!-- Error Message -->
            <div id="error-msg" class="error-msg">
                <span class="material-symbols-outlined">error</span>
                <span id="error-text">Please fill in all details to generate a planner.</span>
            </div>

            <div class="action-container">
                <button id="clear-btn" class="btn btn-outline">
                    <span class="material-symbols-outlined">delete</span>
                    Clear Inputs
                </button>
                <button id="generate-btn" class="btn btn-primary">
                    <span class="material-symbols-outlined">event_available</span>
                    Create Study Plan
                </button>
            </div>
        </div>

        <!-- Output Section -->
        <div id="output-section" class="card">
            <div class="output-header">
                <div class="output-title">
                    <span class="material-symbols-outlined">calendar_month</span>
                    Your Daily Timetable
                </div>
                <div class="output-actions">
                    <button id="copy-btn" class="btn btn-outline btn-sm">
                        <span class="material-symbols-outlined" style="font-size: 1.1em;">content_copy</span>
                        Copy Plan
                    </button>
                    <button id="download-btn" class="btn btn-outline btn-sm">
                        <span class="material-symbols-outlined" style="font-size: 1.1em;">download</span>
                        Download
                    </button>
                </div>
            </div>
            
            <!-- Result container injected via JS -->
            <div id="plan-result">
                <!-- Plan logic goes here -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Study Hub AI. Empowering students globally.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const subjectsInput = document.getElementById('subjects-input');
            const hoursInput = document.getElementById('hours-input');
            const dateInput = document.getElementById('date-input');
            const generateBtn = document.getElementById('generate-btn');
            const clearBtn = document.getElementById('clear-btn');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const outputSection = document.getElementById('output-section');
            const planResult = document.getElementById('plan-result');
            const copyBtn = document.getElementById('copy-btn');
            const downloadBtn = document.getElementById('download-btn');
            
            // Set minimum date to today
            const today = new Date().toISOString().split('T')[0];
            dateInput.min = today;

            // Simple input validation reset
            [subjectsInput, hoursInput, dateInput].forEach(input => {
                input.addEventListener('input', () => {
                    errorMsg.style.display = 'none';
                });
            });

            // Generate Button Click
            generateBtn.addEventListener('click', () => {
                const subjectsRaw = subjectsInput.value.trim();
                const hours = parseInt(hoursInput.value);
                const examDate = dateInput.value;
                
                // Validation
                if (!subjectsRaw) {
                    showError("Please enter at least one subject.");
                    return;
                }
                if (!hours || hours < 1 || hours > 16) {
                    showError("Please enter a valid number of study hours (1-16).");
                    return;
                }
                
                // Hide error and show output
                errorMsg.style.display = 'none';

                // Process subjects
                const subjects = subjectsRaw
                    .split(',')
                    .map(s => s.trim())
                    .filter(s => s.length > 0);
                    
                if (subjects.length === 0) {
                    showError("Please enter valid subjects separated by commas.");
                    return;
                }

                // Generate and display logic
                generateTimetable(subjects, hours, examDate);
                outputSection.style.display = 'block';
                outputSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });

            // Timetable Generation Logic
            function generateTimetable(subjects, totalHours, examDate) {
                // Determine layout rules
                let currentHour = 16; // Start at 4:00 PM (16:00)
                let currentMin = 0;
                
                // Distribute time based on number of subjects
                const timePerSubject = totalHours / subjects.length; // Decimal hours
                const blockMinutes = Math.floor(timePerSubject * 60); // Total minutes per subject block (max before a break)
                
                // We'll standardise it to 1 hr chunks or match the subject math. For simplicity:
                // We will split the subjects into sequential blocks.
                
                let resultHTML = '';
                
                if (examDate && examDate !== '') {
                    // Format date nicely
                    const d = new Date(examDate);
                    // Account for timezone shifting on local date picker
                    const dateString = new Date(d.valueOf() + d.getTimezoneOffset() * 60000).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                    
                    // Add days remaining calculation
                    const daysRemaining = Math.max(0, Math.ceil((d - new Date()) / (1000 * 60 * 60 * 24)));
                    
                    resultHTML += `<div class="plan-header">
                        Target Exam: ${dateString} <span style="font-weight:400; font-size:0.9em;">(${daysRemaining} days left)</span>
                    </div>`;
                }
                
                resultHTML += '<div class="timetable" id="timetable-container">';
                
                // Loop through subjects and create standard hour blocks
                // If study hours < subjects, each subject gets exactly (totalHours/subjects) min block
                // Let's cap blocks to max 1 hr chunks to insert breaks.
                
                let blocksGenerated = 0;
                let subjectIndex = 0;
                
                // Total blocks is essentially totalHours if we do 1 hr blocks.
                // Or if totalHours < subjects, we just do blockMinutes chunks.
                
                const formatTime = (hr, min) => {
                    let ampm = hr >= 12 ? 'PM' : 'AM';
                    let h = hr % 12;
                    h = h ? h : 12; 
                    let m = min < 10 ? '0'+min : min;
                    return `${h}:${m} ${ampm}`;
                };
                
                const addTime = (hr, min, addMin) => {
                    let newMin = min + addMin;
                    let newHr = hr + Math.floor(newMin / 60);
                    newMin = newMin % 60;
                    if(newHr >= 24) newHr -= 24; // Simple rollover
                    return [newHr, newMin];
                };

                // Create individual blocks
                let remainingMinsToAssign = totalHours * 60;
                
                while(remainingMinsToAssign > 0) {
                    let minsForThisBlock = Math.min(60, remainingMinsToAssign); // Max 60 min block
                    
                    // Assign subject
                    const subj = subjects[subjectIndex % subjects.length];
                    subjectIndex++;
                    
                    // Calculate start/end
                    let startStr = formatTime(currentHour, currentMin);
                    let [endHr, endMin] = addTime(currentHour, currentMin, minsForThisBlock);
                    let endStr = formatTime(endHr, endMin);
                    
                    resultHTML += `
                        <div class="time-block">
                            <div class="block-time">
                                <span class="material-symbols-outlined" style="font-size: 1.1em;">schedule</span>
                                ${startStr} - ${endStr}
                            </div>
                            <div class="block-subject">${subj}</div>
                        </div>
                    `;
                    
                    // Move current time forward
                    currentHour = endHr;
                    currentMin = endMin;
                    remainingMinsToAssign -= minsForThisBlock;
                    blocksGenerated++;
                    
                    // Add a break if not the last block
                    if (remainingMinsToAssign > 0 && blocksGenerated % 2 === 0) {
                        let breakMins = 15; // 15 min break every 2 blocks
                        let bStartStr = formatTime(currentHour, currentMin);
                        let [bEndHr, bEndMin] = addTime(currentHour, currentMin, breakMins);
                        let bEndStr = formatTime(bEndHr, bEndMin);
                        
                        resultHTML += `
                            <div class="time-block block-break">
                                <div class="block-time">
                                    <span class="material-symbols-outlined" style="font-size: 1.1em;">coffee</span>
                                    ${bStartStr} - ${bEndStr}
                                </div>
                                <div class="block-subject">Short Break</div>
                            </div>
                        `;
                        
                        currentHour = bEndHr;
                        currentMin = bEndMin;
                    }
                }
                
                resultHTML += '</div>';
                planResult.innerHTML = resultHTML;
            }

            function showError(msg) {
                errorText.textContent = msg;
                errorMsg.style.display = 'flex';
                outputSection.style.display = 'none';
            }

            // Clear Feature
            clearBtn.addEventListener('click', () => {
                subjectsInput.value = '';
                hoursInput.value = '';
                dateInput.value = '';
                errorMsg.style.display = 'none';
                outputSection.style.display = 'none';
                subjectsInput.focus();
            });

            // Copy Feature
            copyBtn.addEventListener('click', () => {
                let textToCopy = `--- Daily Study Plan ---\n\n`;
                
                const tableContainer = document.getElementById('timetable-container');
                const blocks = tableContainer.querySelectorAll('.time-block');
                
                blocks.forEach(block => {
                    const time = block.querySelector('.block-time').textContent.trim().replace('schedule', '').replace('coffee', '').trim();
                    const subject = block.querySelector('.block-subject').textContent.trim();
                    textToCopy += `${subject} — ${time}\n`;
                });
                
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 1.1em;">check</span> Copied!';
                    copyBtn.style.color = 'var(--primary)';
                    copyBtn.style.borderColor = 'var(--primary)';
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHTML;
                        copyBtn.style.color = '';
                        copyBtn.style.borderColor = '';
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                });
            });

            // Download Feature
            downloadBtn.addEventListener('click', () => {
                let textToDownload = `Generated Study Plan\n`;
                if(dateInput.value) {
                    textToDownload += `Target Exam Date: ${dateInput.value}\n`;
                }
                textToDownload += `\n`;
                
                const tableContainer = document.getElementById('timetable-container');
                const blocks = tableContainer.querySelectorAll('.time-block');
                
                blocks.forEach(block => {
                    const time = block.querySelector('.block-time').textContent.trim().replace('schedule', '').replace('coffee', '').trim();
                    const subject = block.querySelector('.block-subject').textContent.trim();
                    textToDownload += `${subject} — ${time}\n`;
                });
                
                const blob = new Blob([textToDownload], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Study_Plan.txt';
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        });
    </script>
</body>
</html>
